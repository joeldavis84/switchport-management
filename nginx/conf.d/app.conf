# PEM at this path may contain both the certificate and private key (same file for both directives).
server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /app/pki/switches.cert4.bos2.lab.crt;
    ssl_certificate_key /app/pki/switches.cert4.bos2.lab.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
