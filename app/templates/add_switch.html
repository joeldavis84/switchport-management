{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-3">
    <h2 class="mb-0">Add New Switch</h2>
    <a href="{{ url_for('switches.index') }}" class="btn btn-secondary">Back to Switches</a>
</div>
<form method="POST">
    <div class="mb-3">
        <label>IP Address</label>
        <input type="text" name="ip_address" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>SSH Username (uses ~/.ssh keys)</label>
        <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Description</label>
        <input type="text" name="description" class="form-control">
    </div>
    <button type="submit" class="btn btn-success">Save Switch</button>
</form>
{% endblock %}
