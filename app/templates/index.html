{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Configured Switches</h2>
    <a href="{{ url_for('switches.add_switch') }}" class="btn btn-primary">Add Switch</a>
</div>
<ul class="list-group">
    {% for switch in switches %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        <div>
            <strong>{{ switch.ip_address }}</strong> - {{ switch.description }}
        </div>
        <a href="{{ url_for('switches.manage_switch', id=switch.id) }}" class="btn btn-sm btn-outline-primary">Manage</a>
    </li>
    {% else %}
    <li class="list-group-item">No switches configured.</li>
    {% endfor %}
</ul>
{% endblock %}
